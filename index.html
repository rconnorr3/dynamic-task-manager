<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dynamic Task Manager</title>
</head>
<body>

  <h1>Dynamic Task Manager</h1>

  <input type="text" id="taskInput" placeholder="Type a task here">

  <button id="addBtn">Add Task</button>
  <button id="deleteBtn">Delete Specific Task</button>
  <button id="clearBtn">Clear All</button>

  <h2>Current Tasks:</h2>
  <ul id="taskList"></ul>

  <script src="script.js"></script>
</body>
</html>
