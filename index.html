<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dynamic Task Manager 2.0</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            slateDark: "#1B1F24",
          }
        }
      }
    }
  </script>
</head>

<body class="bg-slateDark text-white min-h-screen p-8 flex flex-col items-center">

  <!-- LOGO -->
  <div class="flex items-center gap-4 mb-10 bg-purple-900/60 px-8 py-4 rounded-xl border border-purple-700 shadow-xl">

    <!-- Left Wand -->
    <span class="text-4xl drop-shadow-lg">🪄</span>

    <!-- Logo Text -->
    <h1 class="text-4xl font-extrabold tracking-wide text-purple-300 drop-shadow-lg flex items-center gap-3">
      Dynamic Task Manager 2.0
    </h1>

    <!-- Right Wand -->
    <span class="text-4xl drop-shadow-lg">🪄</span>
  </div>

  <!-- INTRO SIGN -->
  <div class="max-w-3xl bg-purple-900/40 border border-purple-700 rounded-xl p-8 shadow-xl text-center mb-10">

    <p class="text-2xl font-bold text-purple-300 mb-4">
      Welcome to the Dynamic Task Manager 2.0!
    </p>

    <p class="text-xl font-semibold underline text-purple-200 mb-4">
      Instructions
    </p>

    <p class="text-lg leading-relaxed text-purple-100 font-medium">
      Simply type in your tasks that need to be completed, and the 
      <span class="font-extrabold text-purple-300">Dynamic Task Manager 2.0</span> 
      does the rest! It’s like magic! <span class="text-2xl">🪄</span>
    </p>
  </div>

  <!-- INPUT + BUTTONS -->
  <div class="w-full max-w-xl bg-purple-900/40 border border-purple-700 rounded-xl p-6 shadow-lg">
    <h2 class="text-2xl font-bold mb-4 text-purple-200">Add Your Tasks</h2>

    <input
      type="text"
      id="taskInput"
      placeholder="Type a task here..."
      class="w-full px-4 py-2 mb-4 rounded-lg bg-purple-950 border border-purple-700 text-white placeholder-purple-300 focus:outline-none focus:ring-2 focus:ring-purple-400"
    />

    <div class="flex flex-wrap gap-3">
      <button
        id="addBtn"
        class="px-4 py-2 bg-purple-400 text-black font-bold rounded-lg shadow hover:bg-purple-300 transition active:scale-95"
      >
        Add Task
      </button>

      <button
        id="deleteBtn"
        class="px-4 py-2 bg-red-500 text-white font-bold rounded-lg shadow hover:bg-red-400 transition active:scale-95"
      >
        Delete Specific Task
      </button>

      <button
        id="clearBtn"
        class="px-4 py-2 bg-blue-500 text-white font-bold rounded-lg shadow hover:bg-blue-400 transition active:scale-95"
      >
        Clear All
      </button>
    </div>
  </div>

  <!-- TASK LIST -->
  <div class="w-full max-w-xl mt-10">
    <h2 class="text-2xl font-bold mb-4 text-purple-200">Current Tasks:</h2>

    <ul id="taskList" class="space-y-3"></ul>
  </div>

  <!-- Link to external JS file -->
  <script src="script.js"></script>

</body>
</html>
